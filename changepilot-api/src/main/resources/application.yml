spring:
  application:
    name: changepilot-api
  datasource:
    url: jdbc:h2:mem:changepilot;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    deserialization:
      fail-on-unknown-properties: true

changepilot:
  allowed-origin: ${CHANGEPILOT_ALLOWED_ORIGIN:http://localhost:5173}
  demo-data:
    enabled: true

logging:
  level:
    root: INFO
